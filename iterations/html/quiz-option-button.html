<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Option Button</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .options-showcase {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    .state-label {
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: var(--spacing-lg);
      margin-bottom: var(--spacing-xs);
    }

    .state-label:first-child {
      margin-top: 0;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      width: 100%;
      padding: var(--spacing-lg);
      border-radius: var(--radius-md);
      border: 2px solid var(--color-border);
      background: var(--color-surface);
      font-family: inherit;
      font-size: var(--font-md);
      font-weight: var(--weight-medium);
      color: var(--color-text);
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
    }

    .option-btn__label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--color-border-light);
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }

    .option-btn__text {
      flex: 1;
      line-height: 1.4;
    }

    .option-btn__icon {
      flex-shrink: 0;
      font-size: var(--font-lg);
    }

    /* Default */
    .option-btn--default:hover {
      border-color: var(--color-primary-light);
      background: var(--color-surface-light);
    }

    /* Selected */
    .option-btn--selected {
      border-color: var(--color-primary);
      background: var(--color-surface-light);
    }

    .option-btn--selected .option-btn__label {
      background: var(--color-primary);
      color: var(--color-text-inverse);
    }

    /* Correct */
    .option-btn--correct {
      border-color: var(--color-success);
      background: rgba(88, 204, 2, 0.08);
    }

    .option-btn--correct .option-btn__label {
      background: var(--color-success);
      color: var(--color-text-inverse);
    }

    .option-btn--correct .option-btn__text {
      color: var(--color-text);
      font-weight: var(--weight-semibold);
    }

    .option-btn--correct .option-btn__icon {
      color: var(--color-success);
    }

    /* Incorrect */
    .option-btn--incorrect {
      border-color: var(--color-error);
      background: rgba(239, 68, 68, 0.08);
    }

    .option-btn--incorrect .option-btn__label {
      background: var(--color-error);
      color: var(--color-text-inverse);
    }

    .option-btn--incorrect .option-btn__text {
      color: var(--color-text);
    }

    .option-btn--incorrect .option-btn__icon {
      color: var(--color-error);
    }

    /* Disabled (after answer reveal) */
    .option-btn--disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .option-btn--disabled .option-btn__label {
      background: var(--color-border-light);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Quiz Option Button States</p>
    <div class="options-showcase">
      <p class="state-label">Default</p>
      <button class="option-btn option-btn--default">
        <span class="option-btn__label">A</span>
        <span class="option-btn__text">Running mathematical simulations</span>
      </button>

      <p class="state-label">Selected</p>
      <button class="option-btn option-btn--selected">
        <span class="option-btn__label">C</span>
        <span class="option-btn__text">Predicting the next word in a sequence</span>
      </button>

      <p class="state-label">Correct</p>
      <button class="option-btn option-btn--correct">
        <span class="option-btn__label">C</span>
        <span class="option-btn__text">Predicting the next word in a sequence</span>
        <span class="option-btn__icon">✓</span>
      </button>

      <p class="state-label">Incorrect</p>
      <button class="option-btn option-btn--incorrect">
        <span class="option-btn__label">A</span>
        <span class="option-btn__text">Running mathematical simulations</span>
        <span class="option-btn__icon">✗</span>
      </button>

      <p class="state-label">Disabled</p>
      <button class="option-btn option-btn--disabled">
        <span class="option-btn__label">B</span>
        <span class="option-btn__text">Stitching databases of facts</span>
      </button>
    </div>
  </div>
</body>
</html>
