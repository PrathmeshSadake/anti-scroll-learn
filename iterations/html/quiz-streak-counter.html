<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Streak Counter</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .streak-showcase {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xxl);
      align-items: center;
    }

    /* Large centered streak */
    .streak-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-xxxl) var(--spacing-xxl);
      background: var(--color-card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      width: 100%;
      text-align: center;
      animation: streakPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes streakPop {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .streak-counter__fire {
      font-size: 56px;
      line-height: 1;
      animation: fireWiggle 0.8s ease-in-out infinite alternate;
    }

    @keyframes fireWiggle {
      0% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.05); }
      100% { transform: rotate(-3deg) scale(1.02); }
    }

    .streak-counter__count {
      font-size: var(--font-display);
      font-weight: var(--weight-heavy);
      color: var(--color-primary);
      line-height: 1;
    }

    .streak-counter__label {
      font-size: var(--font-lg);
      font-weight: var(--weight-bold);
      color: var(--color-text);
    }

    .streak-counter__sub {
      font-size: var(--font-sm);
      color: var(--color-text-secondary);
      font-weight: var(--weight-medium);
    }

    .streak-counter__dots {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-sm);
    }

    .streak-counter__dot {
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--color-progress-bg);
      transition: all 0.3s ease;
    }

    .streak-counter__dot--active {
      background: var(--color-primary);
      box-shadow: 0 0 8px rgba(206, 130, 255, 0.4);
    }

    /* Compact inline streak */
    .streak-inline {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-lg);
      background: rgba(206, 130, 255, 0.1);
      border-radius: var(--radius-full);
      border: 1px solid rgba(206, 130, 255, 0.2);
    }

    .streak-inline__fire {
      font-size: var(--font-lg);
    }

    .streak-inline__text {
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
    }

    /* Streak toast */
    .streak-toast {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
      background: var(--color-card);
      border-radius: var(--radius-xl);
      border: 2px solid var(--color-primary);
      box-shadow: 0 8px 24px rgba(206, 130, 255, 0.2);
      width: 100%;
      animation: toastSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes toastSlide {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .streak-toast__fire {
      font-size: var(--font-xxl);
      animation: fireWiggle 0.8s ease-in-out infinite alternate;
    }

    .streak-toast__content {
      flex: 1;
    }

    .streak-toast__title {
      font-size: var(--font-md);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
    }

    .streak-toast__subtitle {
      font-size: var(--font-xs);
      color: var(--color-text-secondary);
      font-weight: var(--weight-medium);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Quiz Streak Counter</p>
    <div class="streak-showcase">
      <!-- Large streak display -->
      <div class="streak-counter">
        <div class="streak-counter__fire">🔥</div>
        <div class="streak-counter__count">5</div>
        <div class="streak-counter__label">in a row!</div>
        <div class="streak-counter__sub">You're on fire! Keep going!</div>
        <div class="streak-counter__dots">
          <div class="streak-counter__dot streak-counter__dot--active"></div>
          <div class="streak-counter__dot streak-counter__dot--active"></div>
          <div class="streak-counter__dot streak-counter__dot--active"></div>
          <div class="streak-counter__dot streak-counter__dot--active"></div>
          <div class="streak-counter__dot streak-counter__dot--active"></div>
        </div>
      </div>

      <!-- Inline streak badge -->
      <p class="component-title">Inline Variant</p>
      <div class="streak-inline">
        <span class="streak-inline__fire">🔥</span>
        <span class="streak-inline__text">5 streak!</span>
      </div>

      <!-- Toast streak notification -->
      <p class="component-title" style="align-self: flex-start;">Toast Notification</p>
      <div class="streak-toast">
        <span class="streak-toast__fire">🔥</span>
        <div class="streak-toast__content">
          <div class="streak-toast__title">5 in a row!</div>
          <div class="streak-toast__subtitle">Amazing! You're mastering this topic</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
