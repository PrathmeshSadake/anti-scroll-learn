<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section Header</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-lg);
    }

    .section-header__left {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .section-header__icon {
      font-size: var(--font-xl);
    }

    .section-header__title {
      font-size: var(--font-xl);
      font-weight: var(--weight-bold);
      color: var(--color-text);
    }

    .section-header__link {
      font-size: var(--font-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      -webkit-tap-highlight-color: transparent;
    }

    .section-header__link:active {
      opacity: 0.7;
    }

    .section-header--with-divider {
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--color-border-light);
    }

    .section-header--large .section-header__title {
      font-size: var(--font-xxl);
    }

    .section-header__subtitle {
      font-size: var(--font-sm);
      color: var(--color-text-muted);
      margin-top: var(--spacing-xs);
    }

    .section-header__count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: var(--radius-full);
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
      font-size: var(--font-xs);
      font-weight: var(--weight-bold);
      padding: 0 var(--spacing-xs);
    }

    .variant-gap {
      height: var(--spacing-xxxl);
    }

    .placeholder-card {
      background: var(--color-surface-light);
      border-radius: var(--radius-md);
      padding: var(--spacing-xl);
      border: 1px dashed var(--color-border);
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--font-sm);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Section Headers</p>

    <!-- Standard with See All -->
    <header class="section-header">
      <div class="section-header__left">
        <span class="section-header__icon">📚</span>
        <h2 class="section-header__title">Continue Learning</h2>
      </div>
      <a href="#" class="section-header__link">See All →</a>
    </header>
    <div class="placeholder-card">Content cards go here</div>

    <div class="variant-gap"></div>

    <!-- With Divider -->
    <header class="section-header section-header--with-divider">
      <div class="section-header__left">
        <span class="section-header__icon">🏆</span>
        <h2 class="section-header__title">Achievements</h2>
        <span class="section-header__count">5</span>
      </div>
      <a href="#" class="section-header__link">See All →</a>
    </header>
    <div class="placeholder-card">Achievement badges go here</div>

    <div class="variant-gap"></div>

    <!-- Large with subtitle -->
    <header class="section-header section-header--large">
      <div class="section-header__left">
        <div>
          <h2 class="section-header__title">Good morning! 👋</h2>
          <p class="section-header__subtitle">You've completed 3 lessons this week</p>
        </div>
      </div>
    </header>
    <div class="placeholder-card">Dashboard cards go here</div>

    <div class="variant-gap"></div>

    <!-- Simple text-only -->
    <header class="section-header">
      <div class="section-header__left">
        <h2 class="section-header__title">Recent Activity</h2>
      </div>
    </header>
    <div class="placeholder-card">Activity list goes here</div>
  </div>
</body>
</html>
