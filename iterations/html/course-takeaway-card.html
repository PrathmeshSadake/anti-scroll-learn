<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Takeaway Card</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .takeaway-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xxl);
      border: 1px solid var(--color-border-light);
    }

    .takeaway-card__badge {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-full);
      margin-bottom: var(--spacing-lg);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .takeaway-card__icon {
      font-size: var(--font-xxxl);
      margin-bottom: var(--spacing-lg);
    }

    .takeaway-card__label {
      font-size: var(--font-sm);
      font-weight: var(--weight-semibold);
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--spacing-sm);
    }

    .takeaway-card__summary {
      font-size: var(--font-lg);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
      line-height: 1.5;
      margin-bottom: var(--spacing-xxl);
    }

    .takeaway-card__divider {
      height: 1px;
      background: var(--color-border);
      margin-bottom: var(--spacing-xl);
    }

    .takeaway-card__next {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      background: var(--color-surface-light);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid var(--color-border-light);
    }

    .takeaway-card__next:active {
      transform: scale(0.98);
    }

    .takeaway-card__next-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .takeaway-card__next-icon svg {
      width: 16px;
      height: 16px;
    }

    .takeaway-card__next-content {
      flex: 1;
    }

    .takeaway-card__next-label {
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--spacing-xs);
    }

    .takeaway-card__next-teaser {
      font-size: var(--font-sm);
      color: var(--color-text);
      font-weight: var(--weight-medium);
      line-height: 1.4;
    }

    .takeaway-card__next-arrow {
      color: var(--color-text-muted);
      font-size: var(--font-lg);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Course Takeaway Card</p>

    <article class="takeaway-card">
      <span class="takeaway-card__badge">🎯 Key Takeaway</span>

      <div class="takeaway-card__icon">🧠</div>
      <p class="takeaway-card__label">Remember this</p>
      <p class="takeaway-card__summary">Generative AI creates new content by learning patterns from massive datasets — it's the performer, not the judge.</p>

      <div class="takeaway-card__divider"></div>

      <div class="takeaway-card__next">
        <div class="takeaway-card__next-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        <div class="takeaway-card__next-content">
          <p class="takeaway-card__next-label">Up Next</p>
          <p class="takeaway-card__next-teaser">How do LLMs actually generate text, word by word?</p>
        </div>
        <span class="takeaway-card__next-arrow">›</span>
      </div>
    </article>
  </div>
</body>
</html>
