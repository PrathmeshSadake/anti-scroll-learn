<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Lesson Item</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .items-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }
    .module-lesson-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg);
      background: var(--color-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .module-lesson-item:hover {
      border-color: var(--color-primary-light);
      background: var(--color-surface-light);
    }
    .module-lesson-item__type-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-lg);
      flex-shrink: 0;
    }
    .module-lesson-item__type-icon--lesson {
      background: var(--color-primary-light);
    }
    .module-lesson-item__type-icon--quiz {
      background: #fef3c7;
    }
    .module-lesson-item__content {
      flex: 1;
      min-width: 0;
    }
    .module-lesson-item__title {
      font-size: var(--font-md);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .module-lesson-item__meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-top: 2px;
    }
    .module-lesson-item__type-label {
      font-size: var(--font-xs);
      color: var(--color-text-muted);
      font-weight: var(--weight-medium);
    }
    .module-lesson-item__status {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      padding: 2px var(--spacing-sm);
      border-radius: var(--radius-full);
    }
    .module-lesson-item__status--completed {
      background: #dcfce7;
      color: #166534;
    }
    .module-lesson-item__status--in-progress {
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
    }
    .module-lesson-item__status--not-started {
      background: var(--color-surface-light);
      color: var(--color-text-muted);
    }
    .module-lesson-item__chevron {
      color: var(--color-text-muted);
      font-size: var(--font-lg);
      flex-shrink: 0;
    }
    .demo-label {
      font-size: var(--font-xs);
      color: var(--color-text-muted);
      font-weight: var(--weight-medium);
      margin-bottom: var(--spacing-sm);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Module Lesson Item</p>
    <div class="items-list">
      <p class="demo-label">Completed Lesson</p>
      <div class="module-lesson-item">
        <div class="module-lesson-item__type-icon module-lesson-item__type-icon--lesson">📖</div>
        <div class="module-lesson-item__content">
          <p class="module-lesson-item__title">1. What is AI?</p>
          <div class="module-lesson-item__meta">
            <span class="module-lesson-item__type-label">Lesson</span>
            <span class="module-lesson-item__status module-lesson-item__status--completed">✓ Completed</span>
          </div>
        </div>
        <span class="module-lesson-item__chevron">›</span>
      </div>

      <p class="demo-label">In Progress Lesson</p>
      <div class="module-lesson-item">
        <div class="module-lesson-item__type-icon module-lesson-item__type-icon--lesson">📖</div>
        <div class="module-lesson-item__content">
          <p class="module-lesson-item__title">2. Types of AI</p>
          <div class="module-lesson-item__meta">
            <span class="module-lesson-item__type-label">Lesson</span>
            <span class="module-lesson-item__status module-lesson-item__status--in-progress">◉ In Progress</span>
          </div>
        </div>
        <span class="module-lesson-item__chevron">›</span>
      </div>

      <p class="demo-label">Not Started Lesson</p>
      <div class="module-lesson-item">
        <div class="module-lesson-item__type-icon module-lesson-item__type-icon--lesson">📖</div>
        <div class="module-lesson-item__content">
          <p class="module-lesson-item__title">1. Machine Learning Basics</p>
          <div class="module-lesson-item__meta">
            <span class="module-lesson-item__type-label">Lesson</span>
            <span class="module-lesson-item__status module-lesson-item__status--not-started">○ Not started</span>
          </div>
        </div>
        <span class="module-lesson-item__chevron">›</span>
      </div>

      <p class="demo-label">Quiz Item</p>
      <div class="module-lesson-item">
        <div class="module-lesson-item__type-icon module-lesson-item__type-icon--quiz">🧠</div>
        <div class="module-lesson-item__content">
          <p class="module-lesson-item__title">3. Fundamentals Quiz</p>
          <div class="module-lesson-item__meta">
            <span class="module-lesson-item__type-label">Quiz</span>
            <span class="module-lesson-item__status module-lesson-item__status--not-started">○ Not started</span>
          </div>
        </div>
        <span class="module-lesson-item__chevron">›</span>
      </div>
    </div>
  </div>
</body>
</html>
