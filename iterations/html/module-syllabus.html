<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Syllabus</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .syllabus {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .syllabus-module {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      overflow: hidden;
    }
    .syllabus-module:first-child {
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .syllabus-module:last-child {
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .syllabus-module + .syllabus-module {
      border-top: none;
    }
    .syllabus-module__header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg) var(--spacing-xl);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .syllabus-module__header:hover {
      background: var(--color-surface-light);
    }
    .syllabus-module__number {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
      flex-shrink: 0;
    }
    .syllabus-module__number--completed {
      background: var(--color-success);
    }
    .syllabus-module__info {
      flex: 1;
      min-width: 0;
    }
    .syllabus-module__title {
      font-size: var(--font-md);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.3;
    }
    .syllabus-module__meta {
      font-size: var(--font-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .syllabus-module__chevron {
      font-size: var(--font-md);
      color: var(--color-text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .syllabus-module--open .syllabus-module__chevron {
      transform: rotate(90deg);
    }
    .syllabus-lessons {
      border-top: 1px solid var(--color-border-light);
    }
    .syllabus-lesson {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
      padding-left: calc(var(--spacing-xl) + 32px + var(--spacing-md));
      border-bottom: 1px solid var(--color-border-light);
      transition: background 0.15s ease;
      cursor: pointer;
    }
    .syllabus-lesson:last-child {
      border-bottom: none;
    }
    .syllabus-lesson:hover {
      background: var(--color-surface-light);
    }
    .syllabus-lesson__check {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    .syllabus-lesson__check--done {
      background: var(--color-success);
      color: var(--color-text-inverse);
    }
    .syllabus-lesson__check--pending {
      border: 2px solid var(--color-border);
    }
    .syllabus-lesson__title {
      font-size: var(--font-sm);
      color: var(--color-text);
      font-weight: var(--weight-medium);
      flex: 1;
    }
    .syllabus-lesson__type {
      font-size: var(--font-xs);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Syllabus Tree View</p>
    <div class="syllabus">
      <!-- Module 1 - expanded -->
      <div class="syllabus-module syllabus-module--open" onclick="this.classList.toggle('syllabus-module--open'); this.querySelector('.syllabus-lessons').style.display = this.classList.contains('syllabus-module--open') ? 'block' : 'none';">
        <div class="syllabus-module__header">
          <div class="syllabus-module__number">1</div>
          <div class="syllabus-module__info">
            <h3 class="syllabus-module__title">Foundations of Artificial Intelligence</h3>
            <p class="syllabus-module__meta">3 items · 1/3 completed</p>
          </div>
          <span class="syllabus-module__chevron">›</span>
        </div>
        <div class="syllabus-lessons">
          <div class="syllabus-lesson" onclick="event.stopPropagation();">
            <div class="syllabus-lesson__check syllabus-lesson__check--done">✓</div>
            <span class="syllabus-lesson__title">1. What is AI?</span>
            <span class="syllabus-lesson__type">📖</span>
          </div>
          <div class="syllabus-lesson" onclick="event.stopPropagation();">
            <div class="syllabus-lesson__check syllabus-lesson__check--pending"></div>
            <span class="syllabus-lesson__title">2. Types of AI</span>
            <span class="syllabus-lesson__type">📖</span>
          </div>
          <div class="syllabus-lesson" onclick="event.stopPropagation();">
            <div class="syllabus-lesson__check syllabus-lesson__check--pending"></div>
            <span class="syllabus-lesson__title">3. Fundamentals Quiz</span>
            <span class="syllabus-lesson__type">🧠</span>
          </div>
        </div>
      </div>

      <!-- Module 2 - collapsed -->
      <div class="syllabus-module" onclick="this.classList.toggle('syllabus-module--open'); this.querySelector('.syllabus-lessons').style.display = this.classList.contains('syllabus-module--open') ? 'block' : 'none';">
        <div class="syllabus-module__header">
          <div class="syllabus-module__number">2</div>
          <div class="syllabus-module__info">
            <h3 class="syllabus-module__title">Machine Learning vs Deep Learning</h3>
            <p class="syllabus-module__meta">2 items · 0/2 completed</p>
          </div>
          <span class="syllabus-module__chevron">›</span>
        </div>
        <div class="syllabus-lessons" style="display: none;">
          <div class="syllabus-lesson" onclick="event.stopPropagation();">
            <div class="syllabus-lesson__check syllabus-lesson__check--pending"></div>
            <span class="syllabus-lesson__title">1. Machine Learning Basics</span>
            <span class="syllabus-lesson__type">📖</span>
          </div>
          <div class="syllabus-lesson" onclick="event.stopPropagation();">
            <div class="syllabus-lesson__check syllabus-lesson__check--pending"></div>
            <span class="syllabus-lesson__title">2. The Deep Learning Revolution</span>
            <span class="syllabus-lesson__type">📖</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
