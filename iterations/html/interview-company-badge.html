<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Badges</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .badge-showcase {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xl);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }

    .badge-section-label {
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: var(--spacing-xs);
    }

    .company-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-full);
      font-size: var(--font-sm);
      font-weight: var(--weight-semibold);
      transition: transform 0.15s ease;
      cursor: default;
    }

    .company-badge:hover {
      transform: scale(1.03);
    }

    .company-badge-icon {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-xs);
      font-weight: var(--weight-heavy);
      color: var(--color-text-inverse);
    }

    /* Google */
    .company-badge.google {
      background: rgba(66, 133, 244, 0.1);
      color: #4285F4;
    }
    .company-badge.google .company-badge-icon {
      background: #4285F4;
    }

    /* Meta */
    .company-badge.meta {
      background: rgba(24, 119, 242, 0.1);
      color: #1877F2;
    }
    .company-badge.meta .company-badge-icon {
      background: #1877F2;
    }

    /* Amazon */
    .company-badge.amazon {
      background: rgba(255, 153, 0, 0.1);
      color: #FF9900;
    }
    .company-badge.amazon .company-badge-icon {
      background: #FF9900;
    }

    /* Netflix */
    .company-badge.netflix {
      background: rgba(229, 9, 20, 0.1);
      color: #E50914;
    }
    .company-badge.netflix .company-badge-icon {
      background: #E50914;
    }

    /* OpenAI */
    .company-badge.openai {
      background: rgba(16, 163, 127, 0.1);
      color: #10A37F;
    }
    .company-badge.openai .company-badge-icon {
      background: #10A37F;
    }

    /* Uber */
    .company-badge.uber {
      background: rgba(0, 0, 0, 0.06);
      color: var(--color-text);
    }
    .company-badge.uber .company-badge-icon {
      background: var(--color-text);
    }

    /* Large variant */
    .company-badge.large {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--font-md);
      border-radius: var(--radius-md);
    }

    .company-badge.large .company-badge-icon {
      width: 32px;
      height: 32px;
      font-size: var(--font-sm);
    }

    /* Compact variant */
    .company-badge.compact {
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: var(--font-xs);
      gap: var(--spacing-xs);
    }

    .company-badge.compact .company-badge-icon {
      width: 18px;
      height: 18px;
      font-size: 9px;
    }

    /* Usage in context card */
    .context-card {
      background: var(--color-prep-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      border: 1px solid var(--color-border);
      margin-top: var(--spacing-lg);
    }

    .context-card-label {
      font-size: var(--font-xs);
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-sm);
    }

    .context-card-question {
      font-size: var(--font-md);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
      margin-bottom: var(--spacing-md);
    }

    .context-badges {
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Company Badges</p>

    <div class="badge-showcase">
      <div>
        <p class="badge-section-label">Default Size</p>
        <div class="badge-row">
          <span class="company-badge google">
            <span class="company-badge-icon">G</span> Google
          </span>
          <span class="company-badge meta">
            <span class="company-badge-icon">M</span> Meta
          </span>
          <span class="company-badge amazon">
            <span class="company-badge-icon">A</span> Amazon
          </span>
          <span class="company-badge netflix">
            <span class="company-badge-icon">N</span> Netflix
          </span>
        </div>
      </div>

      <div>
        <p class="badge-section-label">Large Size</p>
        <div class="badge-row">
          <span class="company-badge google large">
            <span class="company-badge-icon">G</span> Google
          </span>
          <span class="company-badge openai large">
            <span class="company-badge-icon">O</span> OpenAI
          </span>
        </div>
      </div>

      <div>
        <p class="badge-section-label">Compact Size</p>
        <div class="badge-row">
          <span class="company-badge meta compact">
            <span class="company-badge-icon">M</span> Meta
          </span>
          <span class="company-badge amazon compact">
            <span class="company-badge-icon">A</span> Amazon
          </span>
          <span class="company-badge uber compact">
            <span class="company-badge-icon">U</span> Uber
          </span>
          <span class="company-badge openai compact">
            <span class="company-badge-icon">O</span> OpenAI
          </span>
        </div>
      </div>

      <div class="context-card">
        <p class="context-card-label">Asked at</p>
        <p class="context-card-question">What is the primary purpose of tokenization in LLMs?</p>
        <div class="context-badges">
          <span class="company-badge google compact">
            <span class="company-badge-icon">G</span> Google
          </span>
          <span class="company-badge meta compact">
            <span class="company-badge-icon">M</span> Meta
          </span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
