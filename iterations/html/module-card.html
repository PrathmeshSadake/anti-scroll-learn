<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Card</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }
    .module-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      border: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .module-card:hover {
      border-color: var(--color-primary-light);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }
    .module-card__number {
      font-size: var(--font-xs);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .module-card__title {
      font-size: var(--font-lg);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.3;
    }
    .module-card__meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }
    .module-card__meta-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      font-size: var(--font-sm);
      color: var(--color-text-muted);
      font-weight: var(--weight-medium);
    }
    .module-card__progress-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }
    .module-card__progress-bar {
      flex: 1;
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--color-progress-bg);
      overflow: hidden;
    }
    .module-card__progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      transition: width 0.4s ease;
    }
    .module-card__progress-pct {
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      min-width: 36px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Module Card</p>
    <div class="cards-list">
      <article class="module-card">
        <span class="module-card__number">Module 1</span>
        <h2 class="module-card__title">Foundations of Artificial Intelligence</h2>
        <div class="module-card__meta">
          <span class="module-card__meta-item">📖 3 lessons</span>
          <span class="module-card__meta-item">⏱ ~15 min</span>
        </div>
        <div class="module-card__progress-row">
          <div class="module-card__progress-bar">
            <div class="module-card__progress-fill" style="width: 33%"></div>
          </div>
          <span class="module-card__progress-pct">33%</span>
        </div>
      </article>
      <article class="module-card">
        <span class="module-card__number">Module 2</span>
        <h2 class="module-card__title">Machine Learning vs Deep Learning</h2>
        <div class="module-card__meta">
          <span class="module-card__meta-item">📖 2 lessons</span>
          <span class="module-card__meta-item">⏱ ~10 min</span>
        </div>
        <div class="module-card__progress-row">
          <div class="module-card__progress-bar">
            <div class="module-card__progress-fill" style="width: 0%"></div>
          </div>
          <span class="module-card__progress-pct">0%</span>
        </div>
      </article>
    </div>
  </div>
</body>
</html>
