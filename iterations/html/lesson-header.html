<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Header</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .headers-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xl);
    }
    .lesson-header {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      border: 1px solid var(--color-border);
    }
    .lesson-header__top-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }
    .lesson-header__back {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--color-surface-light);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      font-size: var(--font-lg);
      color: var(--color-text);
      flex-shrink: 0;
    }
    .lesson-header__topic {
      display: inline-flex;
      align-items: center;
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: var(--radius-full);
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      letter-spacing: 0.3px;
    }
    .lesson-header__topic--javascript { background: #fef3c7; color: #92400e; }
    .lesson-header__topic--python { background: #d1fae5; color: #065f46; }
    .lesson-header__topic--css { background: #dbeafe; color: #1e40af; }
    .lesson-header__title {
      font-size: var(--font-xxl);
      font-weight: var(--weight-heavy);
      color: var(--color-text);
      line-height: 1.2;
    }
    .lesson-header__meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-top: var(--spacing-sm);
    }
    .lesson-header__meta-item {
      font-size: var(--font-sm);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Lesson Header</p>
    <div class="headers-list">
      <header class="lesson-header">
        <div class="lesson-header__top-row">
          <button class="lesson-header__back" aria-label="Go back">←</button>
          <span class="lesson-header__topic lesson-header__topic--javascript">⚡ JavaScript</span>
        </div>
        <h1 class="lesson-header__title">Closures</h1>
        <div class="lesson-header__meta">
          <span class="lesson-header__meta-item">📖 3 sections</span>
          <span class="lesson-header__meta-item">⏱ ~5 min</span>
        </div>
      </header>

      <header class="lesson-header">
        <div class="lesson-header__top-row">
          <button class="lesson-header__back" aria-label="Go back">←</button>
          <span class="lesson-header__topic lesson-header__topic--python">🐍 Python</span>
        </div>
        <h1 class="lesson-header__title">List Comprehensions</h1>
        <div class="lesson-header__meta">
          <span class="lesson-header__meta-item">📖 2 sections</span>
          <span class="lesson-header__meta-item">⏱ ~4 min</span>
        </div>
      </header>

      <header class="lesson-header">
        <div class="lesson-header__top-row">
          <button class="lesson-header__back" aria-label="Go back">←</button>
          <span class="lesson-header__topic lesson-header__topic--css">🎨 CSS</span>
        </div>
        <h1 class="lesson-header__title">Flexbox Basics</h1>
        <div class="lesson-header__meta">
          <span class="lesson-header__meta-item">📖 4 sections</span>
          <span class="lesson-header__meta-item">⏱ ~6 min</span>
        </div>
      </header>
    </div>
  </div>
</body>
</html>
