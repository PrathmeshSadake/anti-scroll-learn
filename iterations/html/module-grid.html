<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module Grid</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
    }
    .grid-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      border: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .grid-card:hover {
      border-color: var(--color-primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }
    .grid-card__icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--color-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-xl);
    }
    .grid-card__number {
      font-size: var(--font-xs);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .grid-card__title {
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .grid-card__lessons {
      font-size: var(--font-xs);
      color: var(--color-text-muted);
      font-weight: var(--weight-medium);
    }
    .grid-card__progress-bar {
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--color-progress-bg);
      overflow: hidden;
      margin-top: auto;
    }
    .grid-card__progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-primary);
    }
    .grid-card__pct {
      font-size: var(--font-xs);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
    }
    .grid-card--completed {
      border-color: var(--color-success);
    }
    .grid-card--completed .grid-card__icon {
      background: #dcfce7;
    }
    .grid-card--completed .grid-card__pct {
      color: var(--color-success);
    }
    .grid-card--completed .grid-card__progress-fill {
      background: var(--color-success);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Module Grid</p>
    <div class="module-grid">
      <article class="grid-card">
        <div class="grid-card__icon">🧠</div>
        <span class="grid-card__number">Module 1</span>
        <h3 class="grid-card__title">Foundations of Artificial Intelligence</h3>
        <span class="grid-card__lessons">📖 3 items</span>
        <div class="grid-card__progress-bar">
          <div class="grid-card__progress-fill" style="width: 33%"></div>
        </div>
        <span class="grid-card__pct">33%</span>
      </article>

      <article class="grid-card">
        <div class="grid-card__icon">⚙️</div>
        <span class="grid-card__number">Module 2</span>
        <h3 class="grid-card__title">Machine Learning vs Deep Learning</h3>
        <span class="grid-card__lessons">📖 2 items</span>
        <div class="grid-card__progress-bar">
          <div class="grid-card__progress-fill" style="width: 0%"></div>
        </div>
        <span class="grid-card__pct">0%</span>
      </article>

      <article class="grid-card grid-card--completed">
        <div class="grid-card__icon">✅</div>
        <span class="grid-card__number">Module 3</span>
        <h3 class="grid-card__title">Natural Language Processing</h3>
        <span class="grid-card__lessons">📖 4 items</span>
        <div class="grid-card__progress-bar">
          <div class="grid-card__progress-fill" style="width: 100%"></div>
        </div>
        <span class="grid-card__pct">100%</span>
      </article>

      <article class="grid-card">
        <div class="grid-card__icon">🔮</div>
        <span class="grid-card__number">Module 4</span>
        <h3 class="grid-card__title">Computer Vision Fundamentals</h3>
        <span class="grid-card__lessons">📖 3 items</span>
        <div class="grid-card__progress-bar">
          <div class="grid-card__progress-fill" style="width: 66%"></div>
        </div>
        <span class="grid-card__pct">66%</span>
      </article>
    </div>
  </div>
</body>
</html>
