<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Bookmark Card</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .bookmark-cards {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }
    .bookmark-card {
      background: var(--color-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .bookmark-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    .bookmark-card__image-wrapper {
      position: relative;
      width: 100%;
      height: 180px;
      overflow: hidden;
    }
    .bookmark-card__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bookmark-card__badge {
      position: absolute;
      top: var(--spacing-sm);
      left: var(--spacing-sm);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--weight-bold);
      color: var(--color-text-inverse);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge--regulation { background: var(--color-error); }
    .badge--research { background: var(--color-info); }
    .bookmark-card__bookmark {
      position: absolute;
      top: var(--spacing-sm);
      right: var(--spacing-sm);
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--color-card);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s ease, background 0.2s ease;
      font-size: var(--font-lg);
    }
    .bookmark-card__bookmark:hover {
      transform: scale(1.1);
    }
    .bookmark-card__bookmark:active {
      transform: scale(0.95);
    }
    .bookmark-card__bookmark--active {
      background: var(--color-primary);
    }
    .bookmark-card__bookmark-icon {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .bookmark-card__bookmark--active .bookmark-card__bookmark-icon {
      transform: scale(1.15);
    }
    .bookmark-card__body {
      padding: var(--spacing-md) var(--spacing-lg);
      padding-bottom: var(--spacing-lg);
    }
    .bookmark-card__title {
      font-size: var(--font-md);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.35;
      margin-bottom: var(--spacing-sm);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bookmark-card__meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      font-size: var(--font-xs);
      color: var(--color-text-muted);
    }
    .bookmark-card__source {
      font-weight: var(--weight-semibold);
      color: var(--color-text-secondary);
    }
    .bookmark-card__dot {
      width: 3px;
      height: 3px;
      border-radius: var(--radius-full);
      background: var(--color-text-muted);
    }

    @keyframes bookmarkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .bookmark-animate {
      animation: bookmarkPop 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">News Bookmark Card</p>
    <div class="bookmark-cards">
      <article class="bookmark-card">
        <div class="bookmark-card__image-wrapper">
          <img class="bookmark-card__image" src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=800" alt="News">
          <span class="bookmark-card__badge badge--regulation">Regulation</span>
          <button class="bookmark-card__bookmark bookmark-card__bookmark--active" onclick="toggleBookmark(this)" aria-label="Bookmark">
            <span class="bookmark-card__bookmark-icon">🔖</span>
          </button>
        </div>
        <div class="bookmark-card__body">
          <h3 class="bookmark-card__title">Govt bans Jugnu & 4 other OTT platforms over obscene content</h3>
          <div class="bookmark-card__meta">
            <span class="bookmark-card__source">The Verge</span>
            <span class="bookmark-card__dot"></span>
            <time>12:05 pm on 27 Feb 2026</time>
          </div>
        </div>
      </article>
      <article class="bookmark-card">
        <div class="bookmark-card__image-wrapper">
          <img class="bookmark-card__image" src="https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=800" alt="News">
          <span class="bookmark-card__badge badge--research">Research</span>
          <button class="bookmark-card__bookmark" onclick="toggleBookmark(this)" aria-label="Bookmark">
            <span class="bookmark-card__bookmark-icon">🔖</span>
          </button>
        </div>
        <div class="bookmark-card__body">
          <h3 class="bookmark-card__title">Google's Gemini 1.5 Pro sets a new benchmark for multimodal AI processing</h3>
          <div class="bookmark-card__meta">
            <span class="bookmark-card__source">TechCrunch</span>
            <span class="bookmark-card__dot"></span>
            <time>09:30 am on 27 Feb 2026</time>
          </div>
        </div>
      </article>
    </div>
  </div>
  <script>
    function toggleBookmark(btn) {
      btn.classList.toggle('bookmark-card__bookmark--active');
      const icon = btn.querySelector('.bookmark-card__bookmark-icon');
      icon.classList.remove('bookmark-animate');
      void icon.offsetWidth;
      icon.classList.add('bookmark-animate');
    }
  </script>
</body>
</html>
