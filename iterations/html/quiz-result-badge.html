<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Result Badge</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .badges-showcase {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xxl);
    }

    .result-badge {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg) var(--spacing-xl);
      border-radius: var(--radius-md);
      font-weight: var(--weight-semibold);
      font-size: var(--font-md);
      animation: badgeSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes badgeSlideIn {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .result-badge__icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      font-size: var(--font-xl);
      flex-shrink: 0;
    }

    .result-badge__content {
      flex: 1;
    }

    .result-badge__title {
      font-size: var(--font-md);
      font-weight: var(--weight-bold);
      line-height: 1.3;
    }

    .result-badge__subtitle {
      font-size: var(--font-sm);
      font-weight: var(--weight-regular);
      margin-top: var(--spacing-xs);
      opacity: 0.8;
    }

    /* Correct */
    .result-badge--correct {
      background: rgba(88, 204, 2, 0.1);
      border: 1px solid rgba(88, 204, 2, 0.25);
      color: var(--color-text);
    }

    .result-badge--correct .result-badge__icon {
      background: var(--color-success);
      color: var(--color-text-inverse);
    }

    .result-badge--correct .result-badge__title {
      color: var(--color-success);
    }

    /* Incorrect */
    .result-badge--incorrect {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: var(--color-text);
    }

    .result-badge--incorrect .result-badge__icon {
      background: var(--color-error);
      color: var(--color-text-inverse);
    }

    .result-badge--incorrect .result-badge__title {
      color: var(--color-error);
    }

    /* Compact inline badges */
    .inline-badges {
      display: flex;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }

    .result-badge-compact {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-full);
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
    }

    .result-badge-compact--correct {
      background: rgba(88, 204, 2, 0.12);
      color: var(--color-success);
    }

    .result-badge-compact--incorrect {
      background: rgba(239, 68, 68, 0.12);
      color: var(--color-error);
    }

    .result-badge-compact__icon {
      font-size: var(--font-md);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Quiz Result Badges</p>
    <div class="badges-showcase">
      <!-- Full correct badge -->
      <div class="result-badge result-badge--correct">
        <div class="result-badge__icon">✓</div>
        <div class="result-badge__content">
          <div class="result-badge__title">Correct!</div>
          <div class="result-badge__subtitle">Predicting the next word in a sequence</div>
        </div>
      </div>

      <!-- Full incorrect badge -->
      <div class="result-badge result-badge--incorrect">
        <div class="result-badge__icon">✗</div>
        <div class="result-badge__content">
          <div class="result-badge__title">Incorrect</div>
          <div class="result-badge__subtitle">The correct answer was: The Attention mechanism</div>
        </div>
      </div>

      <!-- Compact inline badges -->
      <p class="component-title" style="margin-top: var(--spacing-lg);">Compact Badges</p>
      <div class="inline-badges">
        <span class="result-badge-compact result-badge-compact--correct">
          <span class="result-badge-compact__icon">✓</span> Correct
        </span>
        <span class="result-badge-compact result-badge-compact--incorrect">
          <span class="result-badge-compact__icon">✗</span> Incorrect
        </span>
      </div>
    </div>
  </div>
</body>
</html>
