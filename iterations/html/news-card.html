<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Card</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .news-card {
      background: var(--color-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }
    .news-card__image-wrapper {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }
    .news-card__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .news-card:hover .news-card__image {
      transform: scale(1.03);
    }
    .news-card__badge {
      position: absolute;
      top: var(--spacing-md);
      left: var(--spacing-md);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-full);
      font-size: var(--font-xs);
      font-weight: var(--weight-bold);
      color: var(--color-text-inverse);
      background: var(--color-primary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .news-card__body {
      padding: var(--spacing-lg);
    }
    .news-card__title {
      font-size: var(--font-lg);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.35;
      margin-bottom: var(--spacing-sm);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-card__meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-size: var(--font-xs);
      color: var(--color-text-muted);
    }
    .news-card__source {
      font-weight: var(--weight-semibold);
      color: var(--color-text-secondary);
    }
    .news-card__dot {
      width: 3px;
      height: 3px;
      border-radius: var(--radius-full);
      background: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">News Card</p>
    <article class="news-card">
      <div class="news-card__image-wrapper">
        <img class="news-card__image" src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=800" alt="Govt bans Jugnu & 4 other OTT platforms over obscene content">
        <span class="news-card__badge">Regulation</span>
      </div>
      <div class="news-card__body">
        <h3 class="news-card__title">Govt bans Jugnu & 4 other OTT platforms over obscene content</h3>
        <div class="news-card__meta">
          <span class="news-card__source">The Verge</span>
          <span class="news-card__dot"></span>
          <time>12:05 pm on 27 Feb 2026</time>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
