<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Hook Card</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .hook-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xxxl) var(--spacing-xxl);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--color-border-light);
    }

    .hook-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-dark));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .hook-card__headline {
      font-size: var(--font-xxl);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.25;
      margin-bottom: var(--spacing-lg);
    }

    .hook-card__subheadline {
      font-size: var(--font-md);
      font-weight: var(--weight-regular);
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    .hook-card__icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--color-primary-light);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-xl);
      font-size: var(--font-xxl);
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Course Hook Card</p>

    <article class="hook-card">
      <div class="hook-card__icon">⚡</div>
      <h1 class="hook-card__headline">AI doesn't just analyze anymore — it creates.</h1>
      <p class="hook-card__subheadline">From writing emails to generating code, generative AI is the biggest shift since the internet.</p>
    </article>
  </div>
</body>
</html>
