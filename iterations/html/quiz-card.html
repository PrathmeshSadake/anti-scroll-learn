<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Card</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .quiz-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xxl);
      border: 1px solid var(--color-border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .quiz-card__question-number {
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: var(--spacing-sm);
    }

    .quiz-card__question {
      font-size: var(--font-lg);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      line-height: 1.5;
      margin-bottom: var(--spacing-xxl);
    }

    .quiz-card__options {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .quiz-card__option {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      font-size: var(--font-md);
      font-weight: var(--weight-medium);
      color: var(--color-text);
      text-align: left;
      width: 100%;
    }

    .quiz-card__option:hover {
      border-color: var(--color-primary-light);
      background: var(--color-surface-light);
    }

    .quiz-card__option:active {
      transform: scale(0.98);
    }

    .quiz-card__option.selected {
      border-color: var(--color-primary);
      background: var(--color-surface-light);
    }

    .quiz-card__option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--color-border-light);
      font-size: var(--font-sm);
      font-weight: var(--weight-bold);
      color: var(--color-text-secondary);
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .quiz-card__option.selected .quiz-card__option-label {
      background: var(--color-primary);
      color: var(--color-text-inverse);
    }

    .quiz-card__option-text {
      flex: 1;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Quiz Card</p>
    <div class="quiz-card">
      <div class="quiz-card__question-number">Question 1 of 5</div>
      <h2 class="quiz-card__question">What is the primary function of an LLM at its core?</h2>
      <div class="quiz-card__options">
        <button class="quiz-card__option" data-index="0">
          <span class="quiz-card__option-label">A</span>
          <span class="quiz-card__option-text">Running mathematical simulations</span>
        </button>
        <button class="quiz-card__option" data-index="1">
          <span class="quiz-card__option-label">B</span>
          <span class="quiz-card__option-text">Stitching databases of facts</span>
        </button>
        <button class="quiz-card__option" data-index="2">
          <span class="quiz-card__option-label">C</span>
          <span class="quiz-card__option-text">Predicting the next word in a sequence</span>
        </button>
        <button class="quiz-card__option" data-index="3">
          <span class="quiz-card__option-label">D</span>
          <span class="quiz-card__option-text">Searching the internet for answers</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.quiz-card__option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.quiz-card__option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  </script>
</body>
</html>
