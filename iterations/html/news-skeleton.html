<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Skeleton</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }
    .skeleton-bone {
      background: linear-gradient(
        90deg,
        var(--color-border-light) 0%,
        var(--color-surface-light) 40%,
        var(--color-border-light) 80%
      );
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: var(--radius-sm);
    }

    /* Card skeleton */
    .skeleton-card {
      background: var(--color-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .skeleton-card__image {
      width: 100%;
      height: 180px;
    }
    .skeleton-card__body {
      padding: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }
    .skeleton-card__badge {
      width: 80px;
      height: 20px;
      border-radius: var(--radius-full);
    }
    .skeleton-card__title {
      width: 100%;
      height: 18px;
    }
    .skeleton-card__title--short {
      width: 70%;
      height: 18px;
    }
    .skeleton-card__meta {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-xs);
    }
    .skeleton-card__meta-item {
      width: 60px;
      height: 12px;
    }
    .skeleton-card__meta-item--wide {
      width: 100px;
      height: 12px;
    }

    /* List item skeleton */
    .skeleton-list-item {
      display: flex;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      background: var(--color-card);
      border-radius: var(--radius-md);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }
    .skeleton-list-item__thumb {
      width: 88px;
      height: 88px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .skeleton-list-item__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--spacing-sm);
    }
    .skeleton-list-item__badge {
      width: 60px;
      height: 14px;
      border-radius: var(--radius-full);
    }
    .skeleton-list-item__title {
      width: 100%;
      height: 14px;
    }
    .skeleton-list-item__title--short {
      width: 80%;
      height: 14px;
    }
    .skeleton-list-item__meta {
      width: 50%;
      height: 10px;
    }

    .skeleton-section-label {
      font-size: var(--font-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-sm);
      margin-top: var(--spacing-xl);
    }
    .skeleton-section-label:first-child {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">News Skeleton</p>

    <p class="skeleton-section-label">Card Skeleton</p>
    <div class="skeleton-group">
      <div class="skeleton-card">
        <div class="skeleton-card__image skeleton-bone"></div>
        <div class="skeleton-card__body">
          <div class="skeleton-card__badge skeleton-bone"></div>
          <div class="skeleton-card__title skeleton-bone"></div>
          <div class="skeleton-card__title--short skeleton-bone"></div>
          <div class="skeleton-card__meta">
            <div class="skeleton-card__meta-item skeleton-bone"></div>
            <div class="skeleton-card__meta-item--wide skeleton-bone"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="skeleton-section-label">List Item Skeleton</p>
    <div class="skeleton-group">
      <div class="skeleton-list-item">
        <div class="skeleton-list-item__thumb skeleton-bone"></div>
        <div class="skeleton-list-item__content">
          <div class="skeleton-list-item__badge skeleton-bone"></div>
          <div class="skeleton-list-item__title skeleton-bone"></div>
          <div class="skeleton-list-item__title--short skeleton-bone"></div>
          <div class="skeleton-list-item__meta skeleton-bone"></div>
        </div>
      </div>
      <div class="skeleton-list-item">
        <div class="skeleton-list-item__thumb skeleton-bone"></div>
        <div class="skeleton-list-item__content">
          <div class="skeleton-list-item__badge skeleton-bone"></div>
          <div class="skeleton-list-item__title skeleton-bone"></div>
          <div class="skeleton-list-item__title--short skeleton-bone"></div>
          <div class="skeleton-list-item__meta skeleton-bone"></div>
        </div>
      </div>
      <div class="skeleton-list-item">
        <div class="skeleton-list-item__thumb skeleton-bone"></div>
        <div class="skeleton-list-item__content">
          <div class="skeleton-list-item__badge skeleton-bone"></div>
          <div class="skeleton-list-item__title skeleton-bone"></div>
          <div class="skeleton-list-item__title--short skeleton-bone"></div>
          <div class="skeleton-list-item__meta skeleton-bone"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
