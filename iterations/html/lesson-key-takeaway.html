<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Key Takeaway</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .takeaway-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }
    .key-takeaway {
      background: var(--color-surface-light);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
      border-left: 4px solid var(--color-primary);
      display: flex;
      gap: var(--spacing-md);
      align-items: flex-start;
    }
    .key-takeaway__icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--color-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-xl);
      flex-shrink: 0;
    }
    .key-takeaway__content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }
    .key-takeaway__label {
      font-size: var(--font-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-primary-dark);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .key-takeaway__text {
      font-size: var(--font-md);
      font-weight: var(--weight-medium);
      color: var(--color-text);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="component-preview">
    <p class="component-title">Key Takeaway</p>
    <div class="takeaway-list">
      <aside class="key-takeaway">
        <div class="key-takeaway__icon">💡</div>
        <div class="key-takeaway__content">
          <span class="key-takeaway__label">Key Takeaway</span>
          <p class="key-takeaway__text">Closures let functions 'remember' their creation environment.</p>
        </div>
      </aside>
      <aside class="key-takeaway">
        <div class="key-takeaway__icon">💡</div>
        <div class="key-takeaway__content">
          <span class="key-takeaway__label">Key Takeaway</span>
          <p class="key-takeaway__text">List comprehensions turn multi-line loops into elegant one-liners.</p>
        </div>
      </aside>
      <aside class="key-takeaway">
        <div class="key-takeaway__icon">💡</div>
        <div class="key-takeaway__content">
          <span class="key-takeaway__label">Key Takeaway</span>
          <p class="key-takeaway__text">Flexbox simplifies alignment and distribution of space in one dimension.</p>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
